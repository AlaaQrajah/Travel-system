<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rihlati UI Preview</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="control-panel">
        <div class="control-brand">
          <div class="brand-logo brand-logo--panel">
            <span class="brand-mark">🚌</span>
            <div class="brand-copy">
              <strong>رحلتي</strong>
              <span>Rihlati</span>
            </div>
          </div>
          <div>
            <p class="eyebrow">UI / UX Preview</p>
            <h1>معاينة شاشات رحلتي</h1>
            <p class="panel-copy">
              نسخة تفاعلية داخل نفس مشروع الـ API تعرض شاشة البدء، التعريف، تسجيل الدخول،
              البحث، الرحلات، ولوحة الأدوار.
            </p>
          </div>
        </div>

        <div class="panel-block">
          <div class="panel-header">
            <h2>التنقل بين الشاشات</h2>
            <span class="mini-pill">Live</span>
          </div>
          <div id="screenSelector" class="screen-selector"></div>
        </div>

        <div class="panel-block">
          <div class="panel-header">
            <h2>ملاحظة الشاشة</h2>
          </div>
          <p id="screenNotes" class="panel-note"></p>
        </div>

        <div class="panel-block">
          <div class="panel-header">
            <h2>حالة الربط</h2>
          </div>
          <div id="apiStatus" class="status-grid"></div>
        </div>
      </aside>

      <main class="preview-stage">
        <div class="ambient ambient-one"></div>
        <div class="ambient ambient-two"></div>
        <section class="phone-frame">
          <div class="phone-notch"></div>
          <div id="phoneScreen" class="phone-screen">
            <div class="loading-state">
              <div class="spinner"></div>
              <p>جاري تجهيز الواجهة...</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="/app.js" defer></script>
  </body>
</html>
